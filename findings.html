    <style>
      :root {
        --bg: #EDE8E4;
        --bg-alt: #E6E0DB;
        --ink: #2D2D2D;
        --muted: #6B6560;
        --accent: #4A5568;
        --accent-hover: #B85C38;
        --divider: #C8C0B8;
        --divider-light: #D8D2CC;
        --scroll-offset: 72px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        font-size: 100%;
        scroll-behavior: smooth;
        scrollbar-gutter: stable;
      }

      body {
        min-height: 100vh;
        font-family: 'Work Sans', sans-serif;
        font-weight: 400;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.7;
        font-size: 1.1rem;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      img { max-width: 100%; display: block; }
      a { color: inherit; text-decoration: none; }
      ul { list-style: none; }
      section[id] { scroll-margin-top: var(--scroll-offset); }

      .page {
        position: relative;
        z-index: 1;
      }

      .container {
        width: min(960px, 88vw);
        margin: 0 auto;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(237, 232, 228, 0.92);
        border-bottom: 1px solid var(--divider-light);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 0;
      }

      .header-brand {
        font-family: 'EB Garamond', serif;
        font-size: 1.25rem;
        font-weight: 500;
        color: var(--ink);
        letter-spacing: 0.01em;
        white-space: nowrap;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .text-nav {
        display: flex;
        gap: 1.8rem;
      }

      .text-nav a {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.03em;
        text-transform: uppercase;
        transition: color 0.25s;
      }

      .text-nav a:hover { color: var(--accent-hover); }
      .text-nav a.active { color: var(--accent); }

      .nav-divider {
        width: 1px;
        height: 18px;
        background: var(--divider);
      }

      .icon-nav {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .icon-nav li { display: flex; }

      .icon-nav .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 0.88rem;
        color: var(--muted);
        transition: color 0.25s;
      }

      .icon-nav .icon:hover { color: var(--accent-hover); }
      .icon svg { width: 1em; height: 1em; fill: currentColor; }

      .icon-nav .label {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .findings-hero {
        padding: clamp(4rem, 9vw, 7rem) 0 clamp(2.25rem, 4vw, 3rem);
      }

      .findings-hero h1 {
        font-family: 'EB Garamond', serif;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        font-weight: 500;
        line-height: 1.08;
        letter-spacing: -0.01em;
        color: var(--ink);
        margin-bottom: 1rem;
      }

      .findings-hero p {
        color: var(--muted);
        max-width: 52ch;
        font-size: 1.05rem;
      }

      .findings-posts {
        padding: clamp(2.25rem, 4vw, 3rem) 0 clamp(4rem, 7vw, 6rem);
      }

      .posts-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .post-card {
        padding: 2.3rem 0;
        border-bottom: 1px solid var(--divider);
      }

      .post-card:first-child {
        border-top: 1px solid var(--divider);
      }

      .post-meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.9rem;
        margin-bottom: 0.9rem;
        font-size: 0.82rem;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .post-tag {
        display: inline-flex;
        align-items: center;
        color: var(--accent);
        font-weight: 600;
      }

      .post-card h2 {
        font-family: 'EB Garamond', serif;
        font-size: clamp(1.7rem, 3vw, 2.3rem);
        font-weight: 500;
        line-height: 1.15;
        margin-bottom: 0.7rem;
      }

      .post-card h2 a {
        transition: color 0.25s;
      }

      .post-card h2 a:hover {
        color: var(--accent-hover);
      }

      .post-excerpt {
        color: var(--muted);
        font-size: 0.98rem;
        max-width: 66ch;
      }

      .read-more {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin-top: 1.25rem;
        font-size: 0.92rem;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.02em;
        transition: color 0.25s, gap 0.25s;
      }

      .read-more:hover {
        color: var(--accent-hover);
        gap: 0.65rem;
      }

      .empty-state {
        text-align: center;
        padding: 3rem 0;
      }

      .empty-state h2 {
        font-family: 'EB Garamond', serif;
        font-size: 2rem;
        font-weight: 500;
        margin-bottom: 0.45rem;
      }

      .empty-state p {
        color: var(--muted);
      }

      .site-footer {
        border-top: 1px solid var(--divider);
        padding: 2.5rem 0 3rem;
      }

      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .footer-meta {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .footer-icons {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .footer-icons .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 0.88rem;
        color: var(--muted);
        transition: color 0.25s;
      }

      .footer-icons .icon:hover {
        color: var(--accent-hover);
      }

      [data-reveal] {
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.9s ease, transform 0.9s ease;
        transition-delay: var(--delay, 0s);
      }

      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 860px) {
        .header-inner { justify-content: center; }
        .header-brand { display: none; }
        .header-right { width: 100%; justify-content: center; }
      }

      @media (max-width: 600px) {
        .text-nav { gap: 1.2rem; }
        .text-nav a { font-size: 0.78rem; }
        .nav-divider { display: none; }
        .site-header { position: static; }
        .header-right { flex-wrap: wrap; justify-content: center; gap: 0.6rem; }
        .footer-inner { justify-content: center; text-align: center; flex-direction: column; }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        [data-reveal] { opacity: 1; transform: none; transition: none; }

      (() => {
        const listEl = document.getElementById('posts-list');

        function formatDate(dateStr) {
          if (!dateStr) return 'Unknown date';
          const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateStr);
          if (!match) return 'Unknown date';

          const year = Number(match[1]);
          const month = Number(match[2]);
          const day = Number(match[3]);
          const d = new Date(Date.UTC(year, month - 1, day));

          if (
            d.getUTCFullYear() !== year ||
            d.getUTCMonth() !== month - 1 ||
            d.getUTCDate() !== day
          ) {
            return 'Unknown date';
          }

          return d.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            timeZone: 'UTC'
          });
        }

        // Sort by date descending
        posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        if (posts.length === 0) {
          const empty = document.createElement('article');
          empty.className = 'post-card empty-state';
          empty.setAttribute('data-reveal', '');
          empty.style.setProperty('--delay', '0.05s');
          const emptyHeading = document.createElement('h2');
          emptyHeading.textContent = 'No posts yet';
          const emptyCopy = document.createElement('p');
          emptyCopy.textContent = 'Check back soon for new writing.';
          empty.appendChild(emptyHeading);
          empty.appendChild(emptyCopy);
          listEl.appendChild(empty);
        }

        posts.forEach((post, i) => {
          const delay = (0.05 + i * 0.07).toFixed(2);
          const url = post.url || '#';

          const article = document.createElement('article');
          article.className = 'post-card';
          article.setAttribute('data-reveal', '');
          article.style.setProperty('--delay', delay + 's');

          const meta = document.createElement('div');
          meta.className = 'post-meta';

          const tag = document.createElement('span');
          tag.className = 'post-tag';
          tag.textContent = post.tag || 'General';

          const time = document.createElement('time');
          time.setAttribute('datetime', post.date || '');
          time.textContent = formatDate(post.date);

          meta.appendChild(tag);
          meta.appendChild(time);

          const heading = document.createElement('h2');
          const titleLink = document.createElement('a');
          titleLink.href = url;
          titleLink.textContent = post.title || 'Untitled';
          heading.appendChild(titleLink);

          const excerpt = document.createElement('p');
          excerpt.className = 'post-excerpt';
          excerpt.textContent = post.excerpt || '';

          const readMore = document.createElement('a');
          readMore.href = url;
          readMore.className = 'read-more';
          readMore.textContent = 'Read more \u2192';

          article.appendChild(meta);
          article.appendChild(heading);
          article.appendChild(excerpt);
          article.appendChild(readMore);

          listEl.appendChild(article);
        });

        if (typeof window.applyReveal === 'function') {
          window.applyReveal(listEl);
        } else {
          listEl.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('is-visible'));
        }
      })();
    </script>
  </body>
</html>
