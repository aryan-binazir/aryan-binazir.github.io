<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Blog &ndash; Aryan Binazir</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="images/Favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
    <style>
      /* ═══════════════════════════════════════════
         Blog page – mirrors index.html design
         Posts loaded dynamically from posts/*.md
         ═══════════════════════════════════════════ */

      :root {
        --bg:        #0b0f14;
        --bg-alt:    #111823;
        --ink:       #e8edf2;
        --muted:     #a1a9b5;
        --accent:    #d28c62;
        --accent-2:  #6fb8c9;
        --card:      #141d28;
        --border:    #2a3443;
        --panel:     #101720;
        --shadow:      0 24px 60px rgba(0,0,0,0.55);
        --shadow-soft: 0 12px 32px rgba(0,0,0,0.35);
        --scroll-offset: 84px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        font-size: 86%;
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        font-family: 'Sora', sans-serif;
        color: var(--ink);
        background: linear-gradient(140deg, var(--bg) 0%, #0f151d 45%, var(--bg-alt) 100%);
        line-height: 1.65;
      }

      /* ── AMBIENT ORBS ── */
      body::before,
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      body::before {
        background: radial-gradient(600px circle at 12% 0%, rgba(210,140,98,0.14), transparent 60%);
      }
      body::after {
        background: radial-gradient(700px circle at 85% 8%, rgba(111,184,201,0.12), transparent 55%);
      }

      section[id] { scroll-margin-top: var(--scroll-offset); }
      img { max-width: 100%; display: block; }
      a { color: inherit; text-decoration: none; }
      ul { list-style: none; }

      /* ── DOT GRID ── */
      .page {
        position: relative;
        z-index: 1;
        background-image: radial-gradient(rgba(255,255,255,0.025) 0.6px, transparent 0.6px);
        background-size: 18px 18px;
      }

      .container {
        width: min(1120px, 92vw);
        margin: 0 auto;
      }

      /* ═════════════════ HEADER ═════════════════ */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(11,15,20,0.9);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 0;
      }

      .header-brand {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
        white-space: nowrap;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .text-nav {
        display: flex;
        gap: 1.6rem;
      }
      .text-nav a {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--muted);
        transition: color 0.2s;
      }
      .text-nav a:hover { color: var(--accent-2); }
      .text-nav a.active { color: var(--accent-2); }

      .nav-divider {
        width: 1px;
        height: 22px;
        background: var(--border);
      }

      .icon-nav {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }
      .icon-nav li { display: flex; }
      .icon-nav .icon {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(20,29,40,0.92);
        box-shadow: var(--shadow-soft);
        font-size: 0.95rem;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .icon-nav .icon:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        border-color: rgba(111,184,201,0.6);
      }
      .icon-nav .label {
        position: absolute;
        width: 1px; height: 1px;
        padding: 0; margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap; border: 0;
      }

      /* ═════════════════ BLOG HERO ═════════════════ */
      .blog-hero {
        padding: clamp(3rem, 6vw, 5rem) 0 clamp(1.5rem, 3vw, 2.5rem);
      }
      .blog-hero h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(2.2rem, 4vw, 3.6rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-bottom: 0.6rem;
      }
      .blog-hero p {
        color: var(--muted);
        font-size: clamp(1rem, 1.1vw, 1.15rem);
        max-width: 52ch;
      }

      /* ═════════════════ BLOG POSTS ═════════════════ */
      .blog-posts {
        padding: 0 0 clamp(4rem, 7vw, 6rem);
      }
      .posts-list {
        display: flex;
        flex-direction: column;
        gap: 1.8rem;
      }

      .post-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: clamp(1.6rem, 3vw, 2.4rem);
        box-shadow: var(--shadow-soft);
        transition: transform 0.3s, border-color 0.3s;
      }
      .post-card:hover {
        transform: translateY(-3px);
        border-color: rgba(111,184,201,0.4);
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.75rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .post-tag {
        display: inline-block;
        padding: 0.2rem 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--panel);
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--accent-2);
      }

      .post-card h2 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.3rem, 2vw, 1.7rem);
        letter-spacing: -0.01em;
        margin-bottom: 0.6rem;
      }

      .post-excerpt {
        color: var(--muted);
        font-size: 0.98rem;
        max-width: 75ch;
      }

      .read-more {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--accent-2);
        cursor: pointer;
        transition: color 0.2s, gap 0.2s;
      }
      .read-more:hover {
        color: var(--accent);
        gap: 0.6rem;
      }

      /* ═════════════════ EXPANDED POST BODY ═════════════════ */
      .post-full {
        display: none;
        padding: clamp(1.5rem, 3vw, 2rem) 0 0;
        border-top: 1px solid var(--border);
        margin-top: 1.2rem;
      }
      .post-full.is-open {
        display: block;
      }

      .post-body {
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.75;
        max-width: 72ch;
      }
      .post-body h2 {
        font-family: 'Space Grotesk', sans-serif;
        color: var(--ink);
        font-size: 1.25rem;
        margin: 1.8rem 0 0.6rem;
      }
      .post-body h3 {
        font-family: 'Space Grotesk', sans-serif;
        color: var(--ink);
        font-size: 1.1rem;
        margin: 1.4rem 0 0.5rem;
      }
      .post-body p {
        margin: 0.8rem 0;
      }
      .post-body code {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.15rem 0.45rem;
        font-size: 0.88rem;
        color: var(--accent);
      }
      .post-body pre {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.2rem 1.5rem;
        overflow-x: auto;
        margin: 1.2rem 0;
      }
      .post-body pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.86rem;
        color: var(--ink);
      }
      .post-body ul,
      .post-body ol {
        list-style: disc;
        padding-left: 1.5rem;
        margin: 0.8rem 0;
      }
      .post-body ol { list-style: decimal; }
      .post-body li {
        margin-bottom: 0.4rem;
      }
      .post-body blockquote {
        border-left: 3px solid var(--accent-2);
        padding: 0.8rem 1.2rem;
        margin: 1.2rem 0;
        background: rgba(111,184,201,0.05);
        border-radius: 0 12px 12px 0;
        font-style: italic;
        color: var(--ink);
      }
      .post-body a {
        color: var(--accent-2);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .post-body a:hover {
        color: var(--accent);
      }
      .post-body hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      /* ═════════════════ FOOTER ═════════════════ */
      .site-footer {
        border-top: 1px solid var(--border);
        padding: 2.8rem 0 3.5rem;
        background: rgba(11,15,20,0.65);
      }
      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .footer-meta {
        display: flex;
        gap: 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      /* ═════════════════ SCROLL REVEAL ═════════════════ */
      [data-reveal] {
        opacity: 0;
        transform: translateY(14px);
        transition: opacity 0.8s ease, transform 0.8s ease;
        transition-delay: var(--delay, 0s);
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* ═════════════════ RESPONSIVE ═════════════════ */
      @media (max-width: 960px) {
        .header-inner { justify-content: center; }
        .header-brand { display: none; }
        .header-right { width: 100%; justify-content: center; }
      }

      @media (max-width: 700px) {
        .icon-nav { flex-wrap: wrap; justify-content: center; }
        .text-nav { gap: 1rem; }
        .text-nav a { font-size: 0.82rem; }
        .nav-divider { display: none; }
        .site-header { position: static; }
        .header-right { flex-wrap: wrap; justify-content: center; gap: 0.75rem; }
        .footer-inner { justify-content: center; }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        [data-reveal] { opacity: 1; transform: none; transition: none; }
      }
    </style>
  </head>
  <body class="site">
    <div class="page">
      <!-- ═════════════════ HEADER ═════════════════ -->
      <header class="site-header">
        <div class="container header-inner">
          <a href="index.html" class="header-brand">Aryan Binazir</a>

          <div class="header-right">
            <nav class="text-nav" aria-label="Main navigation">
              <a href="index.html#triage">Triage</a>
              <a href="index.html#projects">Projects</a>
              <a href="blog.html" class="active">Blog</a>
            </nav>

            <span class="nav-divider"></span>

            <nav class="icon-nav" aria-label="Social links">
              <a target="_blank" rel="noopener noreferrer"
                href="https://www.linkedin.com/in/aryanbinazir/"
                class="icon fab fa-linkedin-in" aria-label="LinkedIn" title="LinkedIn">
                <span class="label">LinkedIn</span>
              </a>
              <a target="_blank" rel="noopener noreferrer"
                href="https://github.com/aryan-binazir"
                class="icon fab fa-github" aria-label="GitHub" title="GitHub">
                <span class="label">GitHub</span>
              </a>
              <a target="_blank" rel="noopener noreferrer"
                href="/assets/Aryan-Binazir-Resume.pdf"
                class="icon fas fa-file-alt" aria-label="Resume" title="Resume">
                <span class="label">Resume</span>
              </a>
              <a href="mailto:abinazir@gmail.com"
                class="icon fas fa-envelope" aria-label="Email" title="Email">
                <span class="label">Email</span>
              </a>
            </nav>
          </div>
        </div>
      </header>

      <!-- ═════════════════ MAIN ═════════════════ -->
      <main>
        <!-- ── BLOG HERO ── -->
        <section class="blog-hero">
          <div class="container">
            <h1 data-reveal>Blog</h1>
            <p data-reveal style="--delay: 0.08s">Thoughts on engineering, infrastructure, and building things that work.</p>
          </div>
        </section>

        <!-- ── POSTS (populated by JS from posts/*.md) ── -->
        <section class="blog-posts">
          <div class="container">
            <div class="posts-list" id="posts-list"></div>
          </div>
        </section>
      </main>

      <!-- ═════════════════ FOOTER ═════════════════ -->
      <footer class="site-footer">
        <div class="container footer-inner">
          <ul class="icon-nav" aria-label="Footer social links">
            <li>
              <a target="_blank" rel="noopener noreferrer"
                href="https://www.linkedin.com/in/aryanbinazir/"
                class="icon fab fa-linkedin-in" aria-label="LinkedIn" title="LinkedIn">
                <span class="label">LinkedIn</span>
              </a>
            </li>
            <li>
              <a target="_blank" rel="noopener noreferrer"
                href="https://github.com/aryan-binazir"
                class="icon fab fa-github" aria-label="GitHub" title="GitHub">
                <span class="label">GitHub</span>
              </a>
            </li>
            <li>
              <a target="_blank" rel="noopener noreferrer"
                href="/assets/Aryan-Binazir-Resume.pdf"
                class="icon fas fa-file-alt" aria-label="Resume" title="Resume">
                <span class="label">Resume</span>
              </a>
            </li>
            <li>
              <a href="mailto:abinazir@gmail.com"
                class="icon fas fa-envelope" aria-label="Email" title="Email">
                <span class="label">Email</span>
              </a>
            </li>
          </ul>
          <ul class="footer-meta">
            <li>&copy; Aryan Binazir</li>
          </ul>
        </div>
      </footer>
    </div>

    <!-- marked.js (Markdown parser) + post data (generated by build-posts.sh) -->
    <script src="assets/js/marked.min.js"></script>
    <script src="assets/js/posts-data.js"></script>
    <script src="assets/js/reveal.js"></script>
    <script>
      (() => {
        const listEl = document.getElementById('posts-list');
        const posts = (window.POSTS_DATA || []).slice();

        // ── Format date for display ──
        function formatDate(dateStr) {
          const d = new Date(dateStr + 'T00:00:00');
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Sort by date descending
        posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        posts.forEach((post, i) => {
          const id = 'post-' + i;
          const delay = (0.05 + i * 0.07).toFixed(2);
          const bodyHtml = marked.parse(post.body);

          const article = document.createElement('article');
          article.className = 'post-card';
          article.setAttribute('data-reveal', '');
          article.style.setProperty('--delay', delay + 's');

          article.innerHTML =
            '<div class="post-meta">' +
              '<span class="post-tag">' + (post.tag || 'General') + '</span>' +
              '<time datetime="' + (post.date || '') + '">' + formatDate(post.date) + '</time>' +
            '</div>' +
            '<h2>' + (post.title || 'Untitled') + '</h2>' +
            '<p class="post-excerpt">' + (post.excerpt || '') + '</p>' +
            '<span class="read-more" data-target="' + id + '">Read more &rarr;</span>' +
            '<div class="post-full" id="' + id + '">' +
              '<div class="post-body">' + bodyHtml + '</div>' +
            '</div>';

          listEl.appendChild(article);
        });

        // Reveal observer for dynamically added cards
        const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const revealItems = listEl.querySelectorAll('[data-reveal]');
        if (prefersReduced) {
          revealItems.forEach(el => el.classList.add('is-visible'));
        } else {
          const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
              if (!entry.isIntersecting) return;
              entry.target.classList.add('is-visible');
              obs.unobserve(entry.target);
            });
          }, { threshold: 0.2 });
          revealItems.forEach(el => observer.observe(el));
        }

        // Toggle expand / collapse
        listEl.addEventListener('click', e => {
          const toggle = e.target.closest('.read-more');
          if (!toggle) return;
          const targetId = toggle.getAttribute('data-target');
          const full = document.getElementById(targetId);
          if (!full) return;
          full.classList.toggle('is-open');
          toggle.innerHTML = full.classList.contains('is-open')
            ? 'Read less &larr;'
            : 'Read more &rarr;';
        });
      })();
    </script>
  </body>
</html>
